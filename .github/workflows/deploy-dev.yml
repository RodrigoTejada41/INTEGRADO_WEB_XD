name: Deploy Dev VPS

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on DEV VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_VPS_HOST }}
          username: ${{ secrets.DEV_VPS_USER }}
          key: ${{ secrets.DEV_VPS_SSH_KEY }}
          port: ${{ secrets.DEV_VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/integrado_web_xd_dev"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown -R "$USER":"$USER" "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"
            chmod +x infra/scripts/*.sh
            APP_DIR="$APP_DIR" REPO_URL="$REPO_URL" BRANCH="$BRANCH" APP_USER="$USER" bash infra/scripts/setup-vps.sh
            APP_DIR="$APP_DIR" BRANCH="$BRANCH" TARGET_ENV=dev bash infra/scripts/update.sh
