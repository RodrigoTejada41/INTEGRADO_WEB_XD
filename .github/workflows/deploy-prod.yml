name: Deploy Production VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VPS_HOST_SECRET: ${{ secrets.VPS_HOST }}
      VPS_USER_SECRET: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY_SECRET: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Check PROD secrets
        id: guard
        shell: bash
        run: |
          if [ -z "${VPS_HOST_SECRET}" ] || [ -z "${VPS_USER_SECRET}" ] || [ -z "${VPS_SSH_KEY_SECRET}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "PROD secrets ausentes. Deploy sera ignorado."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Deploy on VPS via SSH
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/integrado_web_xd"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown -R "$USER":"$USER" "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            chmod +x infra/scripts/*.sh
            APP_DIR="$APP_DIR" REPO_URL="$REPO_URL" BRANCH="$BRANCH" APP_USER="$USER" bash infra/scripts/setup-vps.sh
            APP_DIR="$APP_DIR" BRANCH="$BRANCH" bash infra/scripts/update.sh
            APP_DIR="$APP_DIR" bash infra/scripts/install-monitoring-cron.sh
            APP_DIR="$APP_DIR" bash infra/scripts/install-backup-cron.sh

            if [ -n "${{ secrets.DOMAIN }}" ] && [ -n "${{ secrets.LETSENCRYPT_EMAIL }}" ]; then
              if grep -q '^DOMAIN=' .env.prod; then
                sed -i "s/^DOMAIN=.*/DOMAIN=${{ secrets.DOMAIN }}/" .env.prod
              else
                echo "DOMAIN=${{ secrets.DOMAIN }}" >> .env.prod
              fi
              if grep -q '^LETSENCRYPT_EMAIL=' .env.prod; then
                sed -i "s/^LETSENCRYPT_EMAIL=.*/LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}/" .env.prod
              else
                echo "LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}" >> .env.prod
              fi
              if [ -n "${{ secrets.ENABLE_WWW_DOMAIN }}" ]; then
                if grep -q '^ENABLE_WWW_DOMAIN=' .env.prod; then
                  sed -i "s/^ENABLE_WWW_DOMAIN=.*/ENABLE_WWW_DOMAIN=${{ secrets.ENABLE_WWW_DOMAIN }}/" .env.prod
                else
                  echo "ENABLE_WWW_DOMAIN=${{ secrets.ENABLE_WWW_DOMAIN }}" >> .env.prod
                fi
              fi
              APP_DIR="$APP_DIR" bash infra/scripts/enable-https.sh || APP_DIR="$APP_DIR" bash infra/scripts/renew-certificates.sh
              APP_DIR="$APP_DIR" bash infra/scripts/install-https-cron.sh
            fi

      - name: Validate application endpoint
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        shell: bash
        run: |
          curl -fsS "http://${{ secrets.VPS_HOST }}/healthz"
