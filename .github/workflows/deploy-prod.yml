name: Deploy Production VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/integrado_web_xd"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown -R "$USER":"$USER" "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            chmod +x infra/scripts/*.sh
            APP_DIR="$APP_DIR" REPO_URL="$REPO_URL" BRANCH="$BRANCH" APP_USER="$USER" bash infra/scripts/setup-vps.sh
            APP_DIR="$APP_DIR" BRANCH="$BRANCH" bash infra/scripts/update.sh
            APP_DIR="$APP_DIR" bash infra/scripts/install-monitoring-cron.sh
            APP_DIR="$APP_DIR" bash infra/scripts/install-backup-cron.sh

            if [ -n "${{ secrets.DOMAIN }}" ] && [ -n "${{ secrets.LETSENCRYPT_EMAIL }}" ]; then
              if grep -q '^DOMAIN=' .env.prod; then
                sed -i "s/^DOMAIN=.*/DOMAIN=${{ secrets.DOMAIN }}/" .env.prod
              else
                echo "DOMAIN=${{ secrets.DOMAIN }}" >> .env.prod
              fi
              if grep -q '^LETSENCRYPT_EMAIL=' .env.prod; then
                sed -i "s/^LETSENCRYPT_EMAIL=.*/LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}/" .env.prod
              else
                echo "LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}" >> .env.prod
              fi
              APP_DIR="$APP_DIR" bash infra/scripts/enable-https.sh || APP_DIR="$APP_DIR" bash infra/scripts/renew-certificates.sh
            fi

      - name: Validate application endpoint
        shell: bash
        run: |
          curl -fsS "http://${{ secrets.VPS_HOST }}/healthz"
