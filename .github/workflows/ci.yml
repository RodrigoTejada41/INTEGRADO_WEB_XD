name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+pysqlite:///./output/ci.db
      ADMIN_TOKEN: admin-token-test
      AUTO_CREATE_TABLES: "true"
      RETENTION_JOB_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply migrations
        run: mkdir -p output && python scripts/db_migrate.py

      - name: Start API
        run: |
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 > output/uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/health && break
            sleep 1
          done

      - name: Run tests
        run: pytest -q

      - name: Run load test
        run: python scripts/load_test.py --base-url http://127.0.0.1:8000 --requests 20 --concurrency 4

      - name: Roll back local database
        if: always()
        run: python scripts/db_rollback.py
