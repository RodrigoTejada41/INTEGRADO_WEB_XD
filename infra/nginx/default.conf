upstream frontend_app {
    server frontend:8000;
}

upstream backend_api {
    server backend:8000;
}

server {
    listen 80;
    server_name movisystecnologia.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /readyz/backend {
        access_log off;
        proxy_pass http://backend_api/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }

    location = /readyz/sync-admin {
        access_log off;
        proxy_pass http://frontend_app/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name movisystecnologia.com.br;

    ssl_certificate /etc/letsencrypt/live/movisystecnologia.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/movisystecnologia.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    client_max_body_size 20m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = / {
        return 302 /MoviRelatorios/;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /readyz/backend {
        access_log off;
        proxy_pass http://backend_api/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }

    location = /readyz/sync-admin {
        access_log off;
        proxy_pass http://frontend_app/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }

    location = /MoviRelatorios {
        return 301 /MoviRelatorios/;
    }

    location = /MoviRelatorios/ {
        return 302 /MoviRelatorios/login;
    }

    # Cliente em /MoviRelatorios/*
    location /MoviRelatorios/ {
        rewrite ^/MoviRelatorios/(.*)$ /$1 break;
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Compatibilidade para frontend com caminhos absolutos
    location /login { proxy_pass http://frontend_app/login; }
    location /logout { proxy_pass http://frontend_app/logout; }
    location /dashboard { proxy_pass http://frontend_app/dashboard; }
    location /records { proxy_pass http://frontend_app/records; }
    location /history { proxy_pass http://frontend_app/history; }
    location /settings { proxy_pass http://frontend_app/settings; }
    location /static/ { proxy_pass http://frontend_app/static/; }

    location = /admin {
        return 301 /admin/;
    }

    location = /admin/ {
        return 302 /admin/docs;
    }


    # Swagger UI em /admin/docs requisita /openapi.json na raiz por padrao.
    # Estas rotas evitam quebra da documentacao quando a API esta atras de prefixo.
    location = /openapi.json {
        proxy_pass http://backend_api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }

    location = /docs/oauth2-redirect {
        proxy_pass http://backend_api/docs/oauth2-redirect;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }
    # API em /admin/*
    # Ex.: /admin/health/ready -> /health/ready
    location /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
