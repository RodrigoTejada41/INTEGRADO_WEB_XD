upstream frontend_upstream {
    server frontend:8000;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name movisystecnologia.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /readyz/backend {
        access_log off;
        proxy_pass http://backend_upstream/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }

    location = /readyz/sync-admin {
        access_log off;
        proxy_pass http://frontend_upstream/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name movisystecnologia.com.br;

    ssl_certificate /etc/letsencrypt/live/movisystecnologia.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/movisystecnologia.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    client_max_body_size 20m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = / {
        return 302 /MoviRelatorios/;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /readyz/backend {
        access_log off;
        proxy_pass http://backend_upstream/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }

    location = /readyz/sync-admin {
        access_log off;
        proxy_pass http://frontend_upstream/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }

    location = /MoviRelatorios {
        return 301 /MoviRelatorios/;
    }

    location = /MoviRelatorios/ {
        return 302 /MoviRelatorios/login;
    }

    # Cliente em /MoviRelatorios/*
    location /MoviRelatorios/ {
        rewrite ^/MoviRelatorios/(.*)$ /$1 break;
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Compatibilidade para frontend com caminhos absolutos
    location /login { proxy_pass http://frontend_upstream/login; }
    location /logout { proxy_pass http://frontend_upstream/logout; }
    location /dashboard { proxy_pass http://frontend_upstream/dashboard; }
    location /records { proxy_pass http://frontend_upstream/records; }
    location /history { proxy_pass http://frontend_upstream/history; }
    location /settings { proxy_pass http://frontend_upstream/settings; }
    location /connected-apis { proxy_pass http://frontend_upstream; }
    location /static/ { proxy_pass http://frontend_upstream/static/; }

    location = /admin {
        return 301 /admin/;
    }

    location = /admin/api {
        return 301 /admin/api/;
    }

    # API em /admin/api/*
    # Ex.: /admin/api/health/ready -> /health/ready
    # Ex.: /admin/api/api/v1/register -> /api/v1/register
    location /admin/api/ {
        rewrite ^/admin/api/(.*)$ /$1 break;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # UI administrativa em /admin/*
    location /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
