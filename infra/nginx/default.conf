upstream frontend_upstream {
    server frontend:8000;
    keepalive 32;
}

upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # Ajuste para dominio futuro:
    # 1) substitua server_name _;
    # 2) configure certificados LetsEncrypt;
    # 3) habilite bloco listen 443 ssl.

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # API do backend via reverse proxy, backend permanece sem porta publica.
    location /api/admin/ {
        return 403;
    }

    location = /api/metrics {
        return 403;
    }

    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
    }

    # Health endpoint de edge
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location = /readyz/backend {
        access_log off;
        proxy_pass http://backend_upstream/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }

    location = /readyz/sync-admin {
        access_log off;
        proxy_pass http://frontend_upstream/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header Connection "";
    }
}
