services:
  db:
    image: postgres:16-alpine
    container_name: sync_admin_db
    environment:
      POSTGRES_DB: sync_admin
      POSTGRES_USER: sync_user
      POSTGRES_PASSWORD: sync_pass
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sync_user -d sync_admin"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: sync_admin_api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ../runtime:/shared

  web:
    image: nginx:1.27-alpine
    container_name: sync_admin_web
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
