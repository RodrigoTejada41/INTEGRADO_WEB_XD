services:
  db:
    image: postgres:16-alpine
    container_name: integrado_dev_db
    environment:
      POSTGRES_DB: sync_central_dev
      POSTGRES_USER: sync_user
      POSTGRES_PASSWORD: sync_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sync_user -d sync_central_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    container_name: integrado_dev_backend
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg2://sync_user:sync_password@db:5432/sync_central_dev
      ADMIN_TOKEN: dev-admin-token
      JWT_SECRET: dev-jwt-secret
      AUTO_CREATE_TABLES: "true"
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    image: python:3.12-slim
    container_name: integrado_dev_frontend
    working_dir: /app/frontend
    command: python -m http.server 3000 --bind 0.0.0.0
    volumes:
      - ./:/app
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: integrado_dev_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_dev_data:
