x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:16-alpine
    container_name: integrado_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sync_central}
      POSTGRES_USER: ${POSTGRES_USER:-sync_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/postgresql_schema.sql:/docker-entrypoint-initdb.d/01-sync-schema.sql:ro
      - ./infra/sql/init-sync-admin-db.sql:/docker-entrypoint-initdb.d/02-init-sync-admin-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sync_user} -d ${POSTGRES_DB:-sync_central}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: integrado_backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-sync_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sync_central}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-INFO}
      RETENTION_MONTHS: ${RETENTION_MONTHS:-14}
      RETENTION_MODE: ${RETENTION_MODE:-archive}
      RETENTION_JOB_ENABLED: ${RETENTION_JOB_ENABLED:-true}
      RETENTION_JOB_INTERVAL_MINUTES: ${RETENTION_JOB_INTERVAL_MINUTES:-60}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-true}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    networks:
      - internal

  frontend:
    build:
      context: ./sync-admin
      dockerfile: Dockerfile
    container_name: integrado_frontend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      SECRET_KEY: ${SYNC_ADMIN_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-sync_user}:${POSTGRES_PASSWORD}@db:5432/${SYNC_ADMIN_DB:-sync_admin}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      INTEGRATION_API_KEY: ${INTEGRATION_API_KEY}
      CONTROL_API_BASE_URL: http://backend:8000
      CONTROL_ADMIN_TOKEN: ${ADMIN_TOKEN}
      CONTROL_EMPRESA_ID: ${CONTROL_EMPRESA_ID}
      CONTROL_EMPRESA_NOME: ${CONTROL_EMPRESA_NOME:-Empresa XD}
      AGENT_API_KEY_FILE: /shared/agent_api_key.txt
      AGENT_AUDIT_FILE: /shared/agent_audit.log
      LOG_LEVEL: ${FRONTEND_LOG_LEVEL:-INFO}
    volumes:
      - ./runtime:/shared
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: integrado_nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/letsencrypt:ro
    logging: *default-logging
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
