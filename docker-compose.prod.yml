services:
  db:
    image: postgres:16-alpine
    container_name: integrado-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sync_central}
      POSTGRES_USER: ${POSTGRES_USER:-sync_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sync_user} -d ${POSTGRES_DB:-sync_central}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: integrado-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-sync_user}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}@db:5432/${POSTGRES_DB:-sync_central}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN in .env.prod}
      SECRET_KEY: ${BACKEND_SECRET_KEY:?set BACKEND_SECRET_KEY in .env.prod}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-false}
      RETENTION_MODE: ${RETENTION_MODE:-archive}
      RETENTION_MONTHS: ${RETENTION_MONTHS:-14}
      RETENTION_JOB_ENABLED: ${RETENTION_JOB_ENABLED:-true}
      RETENTION_JOB_INTERVAL_MINUTES: ${RETENTION_JOB_INTERVAL_MINUTES:-60}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://example.com}
      MEMORY_DATABASE_URL: sqlite+pysqlite:////app/output/cerebro_vivo.db
      MEMORY_JSON_BACKUP_PATH: /shared/memory_standard.json
    expose:
      - "8000"
    volumes:
      - backend_output:/app/output
      - shared_runtime:/shared
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal

  frontend:
    build:
      context: ./sync-admin
      dockerfile: Dockerfile
    container_name: integrado-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      SECRET_KEY: ${FRONTEND_SECRET_KEY:?set FRONTEND_SECRET_KEY in .env.prod}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: sqlite:////app/data/sync_admin.db
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?set INITIAL_ADMIN_PASSWORD in .env.prod}
      CONTROL_API_BASE_URL: http://backend:8000
      CONTROL_ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN in .env.prod}
      CONTROL_EMPRESA_ID: ${CONTROL_EMPRESA_ID:-12345678000199}
      CONTROL_EMPRESA_NOME: ${CONTROL_EMPRESA_NOME:-Empresa XD}
      AGENT_API_KEY_FILE: /shared/agent_api_key.txt
      AGENT_AUDIT_FILE: /shared/agent_audit.log
    expose:
      - "8000"
    volumes:
      - sync_admin_data:/app/data
      - shared_runtime:/shared
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: integrado-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_PUBLIC_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/healthz >/dev/null && wget -qO- http://127.0.0.1/readyz/backend >/dev/null && wget -qO- http://127.0.0.1/readyz/sync-admin >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

volumes:
  postgres_data:
  backend_output:
  sync_admin_data:
  shared_runtime:

networks:
  internal:
    driver: bridge
